<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PalettenTrack Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#e8eaf0;font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
input,select{background:#0f1117;border:1px solid #2a3050;border-radius:7px;padding:8px 11px;color:#e8eaf0;font-size:13px;outline:none;width:100%;font-family:inherit}
input:focus,select:focus{border-color:#f5a623;box-shadow:0 0 0 3px rgba(245,166,35,0.12)}
select option{background:#1e2336}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#181c27}
::-webkit-scrollbar-thumb{background:#2a3050;border-radius:3px}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.sync-online{background:#10b981;box-shadow:0 0 6px #10b981}
.sync-offline{background:#ef4444}
.sync-loading{background:#f5a623;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgqI7aSWhZHmGrJyxFxKo0Uq87CZicnWk",
  authDomain: "palettentracker.firebaseapp.com",
  projectId: "palettentracker",
  storageBucket: "palettentracker.firebasestorage.app",
  messagingSenderId: "380579660889",
  appId: "1:380579660889:web:0f984871cbea61c43a1d48"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Expose Firebase to React app
window.__db = db;
window.__firebase = { collection, onSnapshot, addDoc, deleteDoc, doc, setDoc, getDoc };
window.__firebaseReady = true;
window.dispatchEvent(new Event('firebaseReady'));
</script>

<script type="text/babel">
const {useState, useMemo, useEffect, useCallback} = React;
const C={bg:'#0f1117',surf:'#181c27',surf2:'#1e2336',brd:'#2a3050',acc:'#f5a623',acc2:'#3b82f6',acc3:'#10b981',danger:'#ef4444',warn:'#f59e0b',txt:'#e8eaf0',txt2:'#8891b0',txt3:'#4a5278',pal:'#f5a623',rah:'#3b82f6',dec:'#10b981'};
const TYP_LABEL={abholung_intern:'Abholung Intern',abholung_extern:'Abholung Extern',retoure_intern:'Retoure Intern',retoure_extern:'Retoure Extern',produktion:'Produktion',manuell:'Manuell'};
const TYP_ICON={abholung_intern:'🔄',abholung_extern:'🚛',retoure_intern:'↩️',retoure_extern:'↩️',produktion:'🏭',manuell:'✏️'};
const TYP_COL={abholung_intern:['rgba(59,130,246,0.15)','#60a5fa'],abholung_extern:['rgba(245,166,35,0.15)','#f5a623'],retoure_intern:['rgba(239,68,68,0.15)','#f87171'],retoure_extern:['rgba(239,68,68,0.15)','#f87171'],produktion:['rgba(16,185,129,0.15)','#34d399'],manuell:['rgba(139,92,246,0.15)','#a78bfa']};
function fmtDt(dt){if(!dt)return'—';return new Date(dt).toLocaleString('de-CH',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function localNow(){const d=new Date();return new Date(d-d.getTimezoneOffset()*60000).toISOString().slice(0,16);}
function fmtDate(){return new Date().toLocaleDateString('de-CH',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});}
const TH={background:C.surf2,fontWeight:700,fontSize:10,letterSpacing:'0.08em',textTransform:'uppercase',color:C.txt3,padding:'9px 10px',textAlign:'left',borderBottom:'1px solid '+C.brd};
const TD={padding:'8px 10px',fontSize:12,borderTop:'1px solid '+C.brd,verticalAlign:'middle'};
const LBL={fontSize:11,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:C.txt2,display:'block',marginBottom:4};

// Firebase hook
function useFirebase(){
  const [ready, setReady] = useState(!!window.__firebaseReady);
  useEffect(()=>{
    if(window.__firebaseReady){setReady(true);return;}
    const h=()=>setReady(true);
    window.addEventListener('firebaseReady',h);
    return()=>window.removeEventListener('firebaseReady',h);
  },[]);
  return ready ? {db:window.__db, ...window.__firebase} : null;
}

function Badge({typ}){
  const[bg,col]=TYP_COL[typ]||['rgba(255,255,255,0.1)',C.txt2];
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:700,background:bg,color:col}}>{TYP_ICON[typ]} {TYP_LABEL[typ]}</span>;
}
function StatCard({label,value,sub,icon,col}){
  return(
    <div style={{background:C.surf,border:'1px solid '+C.brd,borderTop:'3px solid '+col,borderRadius:10,padding:'14px 16px',position:'relative',overflow:'hidden'}}>
      <div style={{fontSize:10,letterSpacing:'0.1em',textTransform:'uppercase',color:C.txt3,marginBottom:4}}>{label}</div>
      <div style={{fontSize:30,fontWeight:800,color:col,lineHeight:1}}>{value}</div>
      <div style={{fontSize:11,color:C.txt2,marginTop:3}}>{sub}</div>
      <div style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',fontSize:26,opacity:0.07}}>{icon}</div>
    </div>
  );
}
function toCSV(headers,rows){
  const esc=v=>{const s=v==null?'':String(v);return(s.includes(';')||s.includes('"'))?'"'+s.replace(/"/g,'""')+'"':s;};
  return[headers,...rows].map(r=>r.map(esc).join(';')).join('\r\n');
}
function dlCSV(fn,c){
  const b=new Blob(['\uFEFF'+c],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click();URL.revokeObjectURL(a.href);
}

function SyncBadge({status}){
  const map={online:['sync-dot sync-online','Synchronisiert'],loading:['sync-dot sync-loading','Verbinde...'],offline:['sync-dot sync-offline','Offline']};
  const[cls,label]=map[status]||map['loading'];
  return <div style={{display:'flex',alignItems:'center',fontSize:11,color:C.txt2}}><span className={cls}></span>{label}</div>;
}

function ExportModal({onClose,buchungen,bestand,spediteure}){
  const today=new Date().toISOString().slice(0,10);
  function ex(type){
    if(type==='buchungen'){
      const rows=buchungen.map(b=>{const d=b.datetime?new Date(b.datetime):null;return[b.id,d?d.toLocaleDateString('de-CH'):'',d?d.toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'}):'',b.typ,b.transporteur,b.kennzeichen,b.paletten,b.rahmen,b.deckel,b.schwund_p||0,b.schwund_r||0,b.schwund_d||0,b.notiz||''];});
      dlCSV('PalettenTrack_Buchungen_'+today+'.csv',toCSV(['ID','Datum','Zeit','Typ','Transporteur','Kennzeichen','Paletten','Rahmen','Deckel','Schwund_P','Schwund_R','Schwund_D','Notiz'],rows));
    }else if(type==='bestand'){
      dlCSV('PalettenTrack_Bestand_'+today+'.csv',toCSV(['Artikel','Bestand','Exportdatum'],[['Paletten',bestand.paletten,today],['Rahmen',bestand.rahmen,today],['Deckel',bestand.deckel,today]]));
    }else if(type==='schwund'){
      const rows=buchungen.filter(b=>b.typ.startsWith('retoure')).map(b=>{const d=b.datetime?new Date(b.datetime):null;return[b.id,d?d.toLocaleDateString('de-CH'):'',b.typ,b.transporteur,b.kennzeichen,b.paletten,b.rahmen,b.deckel,b.schwund_p||0,b.schwund_r||0,b.schwund_d||0,(b.schwund_p||0)+(b.schwund_r||0)+(b.schwund_d||0),b.notiz||''];});
      dlCSV('PalettenTrack_Schwund_'+today+'.csv',toCSV(['ID','Datum','Typ','Transporteur','Kennzeichen','Ret_P','Ret_R','Ret_D','Schw_P','Schw_R','Schw_D','Schw_Ges','Notiz'],rows));
    }else if(type==='spediteure'){
      const rows=spediteure.map(s=>[s.id,s.name,s.typ,s.kontakt||'',s.telefon||'',s.email||'',buchungen.filter(b=>b.transporteur===s.name).length,s.notiz||'']);
      dlCSV('PalettenTrack_Spediteure_'+today+'.csv',toCSV(['ID','Firmenname','Typ','Kontakt','Telefon','Email','Buchungen','Notiz'],rows));
    }
  }
  const cards=[{type:'buchungen',icon:'📋',title:'Buchungen',desc:'Alle Vorgänge inkl. Schwund'},{type:'bestand',icon:'📦',title:'Aktueller Bestand',desc:'Paletten, Rahmen, Deckel'},{type:'schwund',icon:'⚠️',title:'Schwund-Analyse',desc:'Nur Retouren mit Schwund'},{type:'spediteure',icon:'🚚',title:'Spediteure',desc:'Stammdaten und Buchungsanzahl'}];
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.78)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:C.surf,border:'1px solid '+C.brd,borderRadius:14,padding:'1.8rem',width:'100%',maxWidth:500,boxShadow:'0 20px 60px rgba(0,0,0,0.5)'}}>
        <div style={{fontWeight:800,fontSize:18,marginBottom:6}}>📊 Power BI Export</div>
        <div style={{fontSize:12,color:C.txt2,marginBottom:18,lineHeight:1.6}}>In Power BI: <strong style={{color:C.acc}}>Start → Daten abrufen → Text/CSV → Semikolon</strong></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          {cards.map(c=>(
            <div key={c.type} onClick={()=>ex(c.type)} style={{background:C.surf2,border:'1px solid '+C.brd,borderRadius:10,padding:'14px 12px',cursor:'pointer'}}>
              <div style={{fontSize:22,marginBottom:5}}>{c.icon}</div>
              <div style={{fontWeight:700,fontSize:13,marginBottom:3}}>{c.title}</div>
              <div style={{fontSize:11,color:C.txt2}}>{c.desc}</div>
            </div>
          ))}
          <div onClick={()=>cards.forEach((_,i)=>setTimeout(()=>ex(cards[i].type),i*350))} style={{gridColumn:'1/-1',background:'rgba(240,196,25,0.07)',border:'1px solid rgba(240,196,25,0.35)',borderRadius:10,padding:'12px 16px',cursor:'pointer',display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:22}}>⬇️</span>
            <div><div style={{fontWeight:700,fontSize:13,color:'#f0c419'}}>Alles exportieren (4 CSV)</div><div style={{fontSize:11,color:C.txt2}}>Alle Tabellen auf einmal</div></div>
          </div>
        </div>
        <button onClick={onClose} style={{width:'100%',padding:'9px',background:C.surf2,border:'1px solid '+C.brd,borderRadius:7,color:C.txt,fontWeight:600,fontSize:13,cursor:'pointer'}}>✕ Schliessen</button>
      </div>
    </div>
  );
}

function Dashboard({buchungen,bestand}){
  const ret=buchungen.filter(b=>b.typ.startsWith('retoure'));
  const sp=ret.reduce((a,b)=>a+(b.schwund_p||0),0),sr=ret.reduce((a,b)=>a+(b.schwund_r||0),0),sd=ret.reduce((a,b)=>a+(b.schwund_d||0),0);
  const keys=['paletten','rahmen','deckel'];
  const bInfo=[['Paletten',C.pal,'⬡'],['Rahmen',C.rah,'▭'],['Deckel',C.dec,'◻']].map(([name,col,icon],i)=>{
    const k=keys[i];
    return{name,col,icon,val:bestand[k],ab:buchungen.filter(b=>b.typ.startsWith('abholung')).reduce((a,b)=>a+b[k],0),re:ret.reduce((a,b)=>a+b[k],0),pr:buchungen.filter(b=>b.typ==='produktion').reduce((a,b)=>a+b[k],0)};
  });
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:12,marginBottom:20}}>
        <StatCard label="Buchungen" value={buchungen.length} sub="Alle Vorgänge" icon="📋" col={C.acc}/>
        <StatCard label="Abholungen" value={buchungen.filter(b=>b.typ.startsWith('abholung')).length} sub="Intern+Extern" icon="🚛" col={C.acc2}/>
        <StatCard label="Retouren" value={ret.length} sub="Rückgaben" icon="↩️" col={C.acc3}/>
        <StatCard label="Schwund Ges." value={sp+sr+sd} sub="Bei Retouren" icon="⚠️" col={C.danger}/>
        <StatCard label="Paletten" value={bestand.paletten} sub="Lagerbestand" icon="⬡" col={C.pal}/>
        <StatCard label="Rahmen" value={bestand.rahmen} sub="Lagerbestand" icon="▭" col={C.rah}/>
        <StatCard label="Deckel" value={bestand.deckel} sub="Lagerbestand" icon="◻" col={C.dec}/>
      </div>
      <div style={{background:C.surf,border:'1px solid '+C.brd,borderLeft:'4px solid '+C.danger,borderRadius:10,padding:'14px 16px',marginBottom:20}}>
        <div style={{color:C.danger,fontWeight:700,fontSize:13,marginBottom:12}}>⚠️ Schwund bei Retoure</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:10}}>
          {[['🟠 Paletten',sp],['🔵 Rahmen',sr],['🟢 Deckel',sd],['⚠️ Gesamt',sp+sr+sd],['↩️ Retouren',ret.length]].map(([l,v])=>(
            <div key={l} style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:8,padding:'10px 12px',textAlign:'center'}}>
              <div style={{fontSize:26,fontWeight:800,color:C.danger}}>{v}</div>
              <div style={{fontSize:11,color:C.txt2,marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{fontWeight:700,fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',color:C.txt2,marginBottom:14}}>📦 Aktueller Bestand</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:12,marginBottom:20}}>
        {bInfo.map(({name,col,val,icon,ab,re,pr})=>(
          <div key={name} style={{background:C.surf,border:'1px solid '+C.brd,borderTop:'4px solid '+col,borderRadius:10,padding:'1.2rem'}}>
            <div style={{color:col,fontWeight:700,fontSize:12,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:6}}>{icon} {name}</div>
            <div style={{fontSize:44,fontWeight:800,color:col,lineHeight:1}}>{val}</div>
            <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid '+C.brd,display:'flex',flexDirection:'column',gap:4}}>
              {[['🚛 Abgeholt',ab],['↩️ Retourniert',re],['🏭 Produktion',pr]].map(([l,v])=>(
                <div key={l} style={{display:'flex',justifyContent:'space-between',fontSize:11,color:C.txt2}}>
                  <span>{l}</span><span style={{color:C.txt,fontFamily:'monospace'}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
      <div style={{fontWeight:700,fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',color:C.txt2,marginBottom:14}}>🕐 Letzte Buchungen</div>
      <div style={{background:C.surf,border:'1px solid '+C.brd,borderRadius:10,overflow:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr>{['Datum/Zeit','Typ','Transporteur','Paletten','Rahmen','Deckel','Notiz'].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
          <tbody>
            {buchungen.slice(0,8).map(b=>(
              <tr key={b.id}>
                <td style={{...TD,fontFamily:'monospace',fontSize:11,whiteSpace:'nowrap'}}>{fmtDt(b.datetime)}</td>
                <td style={TD}><Badge typ={b.typ}/></td>
                <td style={TD}>{b.transporteur}</td>
                <td style={{...TD,color:C.pal,fontFamily:'monospace'}}>{b.paletten}</td>
                <td style={{...TD,color:C.rah,fontFamily:'monospace'}}>{b.rahmen}</td>
                <td style={{...TD,color:C.dec,fontFamily:'monospace'}}>{b.deckel}</td>
                <td style={{...TD,color:C.txt2,fontSize:11}}>{b.notiz||'—'}</td>
              </tr>
            ))}
            {buchungen.length===0&&<tr><td colSpan={7} style={{...TD,textAlign:'center',color:C.txt3,padding:32}}>Keine Buchungen</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function BuchungView({spediteure,onSave,onNotif}){
  const [typ,setTyp]=useState('abholung_intern');
  const [f,setF]=useState({transporteur:'',kennzeichen:'',datetime:localNow(),paletten:0,rahmen:0,deckel:0,notiz:''});
  const [erw,setErw]=useState({p:0,r:0,d:0});
  const [spSel,setSpSel]=useState('');
  const isRet=typ.startsWith('retoure');
  const TYPS=[['abholung_intern','🔄 Abholung Intern','abholung'],['abholung_extern','🚛 Abholung Extern','abholung'],['retoure_intern','↩️ Retoure Intern','retoure'],['retoure_extern','↩️ Retoure Extern','retoure'],['produktion','🏭 Produktion','produktion'],['manuell','✏️ Manuell','manuell']];
  const GRP={abholung:[C.acc,'rgba(245,166,35,0.15)'],retoure:[C.danger,'rgba(239,68,68,0.15)'],produktion:[C.acc3,'rgba(16,185,129,0.15)'],manuell:['#a78bfa','rgba(139,92,246,0.15)']};
  function save(){
    const p=parseInt(f.paletten)||0,r=parseInt(f.rahmen)||0,d=parseInt(f.deckel)||0;
    if(!p&&!r&&!d){onNotif('⚠️ Mindestens eine Menge eingeben!','warn');return;}
    const schwund_p=isRet?Math.max(0,(parseInt(erw.p)||0)-p):0;
    const schwund_r=isRet?Math.max(0,(parseInt(erw.r)||0)-r):0;
    const schwund_d=isRet?Math.max(0,(parseInt(erw.d)||0)-d):0;
    onSave({typ,...f,paletten:p,rahmen:r,deckel:d,schwund_p,schwund_r,schwund_d});
    setF({transporteur:'',kennzeichen:'',datetime:localNow(),paletten:0,rahmen:0,deckel:0,notiz:''});
    setErw({p:0,r:0,d:0});setSpSel('');
  }
  return(
    <div style={{background:C.surf,border:'1px solid '+C.brd,borderRadius:10,padding:'1.4rem',marginBottom:'1.4rem'}}>
      <div style={{fontWeight:700,fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',color:C.txt2,marginBottom:14}}>➕ Neue Buchung</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}}>
        {TYPS.map(([t,label,grp])=>{const[col,bg]=GRP[grp];const active=typ===t;return <button key={t} onClick={()=>setTyp(t)} style={{background:active?bg:C.surf2,border:'1px solid '+(active?col:C.brd),borderRadius:7,padding:'7px 13px',color:active?col:C.txt2,fontWeight:600,fontSize:12,cursor:'pointer'}}>{label}</button>;})}
      </div>
      {isRet&&(
        <div style={{background:'rgba(239,68,68,0.06)',border:'1px solid rgba(239,68,68,0.18)',borderRadius:8,padding:'12px 14px',marginBottom:14}}>
          <div style={{color:C.danger,fontWeight:700,fontSize:12,marginBottom:10}}>↩️ Erwartete Mengen (Schwund-Berechnung)</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {[['p','Erw. Paletten'],['r','Erw. Rahmen'],['d','Erw. Deckel']].map(([k,l])=>(
              <div key={k}><label style={LBL}>{l}</label><input type="number" min={0} value={erw[k]} onChange={e=>setErw(x=>({...x,[k]:e.target.value}))}/></div>
            ))}
          </div>
        </div>
      )}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12,marginBottom:12}}>
        <div>
          <label style={LBL}>Spediteur wählen</label>
          <select value={spSel} onChange={e=>{setSpSel(e.target.value);if(e.target.value)setF(x=>({...x,transporteur:e.target.value}));}}>
            <option value="">— Aus Liste wählen —</option>
            <optgroup label="🚛 Extern">{spediteure.filter(s=>s.typ==='extern').map(s=><option key={s.id} value={s.name}>{s.name}</option>)}</optgroup>
            <optgroup label="🔄 Intern">{spediteure.filter(s=>s.typ==='intern').map(s=><option key={s.id} value={s.name}>{s.name}</option>)}</optgroup>
          </select>
        </div>
        <div><label style={LBL}>Transporteur / Fahrer</label><input value={f.transporteur} onChange={e=>setF(x=>({...x,transporteur:e.target.value}))} placeholder="Freitext"/></div>
        <div><label style={LBL}>Kennzeichen / LKW</label><input value={f.kennzeichen} onChange={e=>setF(x=>({...x,kennzeichen:e.target.value}))} placeholder="ZH 123 456"/></div>
        <div><label style={LBL}>Datum und Zeit</label><input type="datetime-local" value={f.datetime} onChange={e=>setF(x=>({...x,datetime:e.target.value}))}/></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,background:C.surf2,border:'1px solid '+C.brd,borderRadius:8,padding:'14px',marginBottom:12}}>
        {[['paletten','🟠 Paletten',C.pal],['rahmen','🔵 Rahmen',C.rah],['deckel','🟢 Deckel',C.dec]].map(([k,l,col])=>(
          <div key={k}><label style={{...LBL,color:col}}>{l}</label><input type="number" min={0} value={f[k]} onChange={e=>setF(x=>({...x,[k]:e.target.value}))} style={{borderColor:col+'55'}}/></div>
        ))}
      </div>
      <div style={{marginBottom:14}}><label style={LBL}>Notiz</label><input value={f.notiz} onChange={e=>setF(x=>({...x,notiz:e.target.value}))} placeholder="Freitext..."/></div>
      <div style={{display:'flex',gap:10}}>
        <button onClick={save} style={{background:C.acc,color:'#000',border:'none',borderRadius:7,padding:'8px 18px',fontWeight:700,fontSize:13,cursor:'pointer'}}>✓ Buchung speichern</button>
        <button onClick={()=>{setF({transporteur:'',kennzeichen:'',datetime:localNow(),paletten:0,rahmen:0,deckel:0,notiz:''});setErw({p:0,r:0,d:0});setSpSel('');}} style={{background:C.surf2,color:C.txt,border:'1px solid '+C.brd,borderRadius:7,padding:'8px 18px',fontWeight:600,fontSize:13,cursor:'pointer'}}>✕ Reset</button>
      </div>
    </div>
  );
}

  const [adj,setAdj]=useState({typ:'paletten',aktion:'add',menge:0,grund:''});
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12,marginBottom:20}}>
        {[['Paletten',C.pal,bestand.paletten,'⬡'],['Rahmen',C.rah,bestand.rahmen,'▭'],['Deckel',C.dec,bestand.deckel,'◻']].map(([name,col,val,icon])=>(
          <div key={name} style={{background:C.surf,border:'1px solid '+C.brd,borderTop:'4px solid '+col,borderRadius:10,padding:'1.4rem'}}>

            <div style={{fontSize:52,fontWeight:800,color:col,lineHeight:1,margin:'8px 0 4px'}}>{val}</div>
            <div style={{fontSize:11,color:C.txt2}}>Aktueller Lagerbestand</div>
          </div>
        ))}
      </div>
      <div style={{fontWeight:700,fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',color:C.txt2,marginBottom:14}}>⚙️ Bestand manuell anpassen</div>
      <div style={{background:C.surf,border:'1px solid '+C.brd,borderRadius:10,padding:'1.4rem'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:12,marginBottom:14}}>
          <div><label style={LBL}>Artikel</label><select value={adj.typ} onChange={e=>setAdj(a=>({...a,typ:e.target.value}))}><option value="paletten">Paletten</option><option value="rahmen">Rahmen</option><option value="deckel">Deckel</option></select></div>
          <div><label style={LBL}>Aktion</label><select value={adj.aktion} onChange={e=>setAdj(a=>({...a,aktion:e.target.value}))}><option value="add">Hinzufügen (+)</option><option value="sub">Abziehen (-)</option><option value="set">Setzen (=)</option></select></div>
          <div><label style={LBL}>Menge</label><input type="number" min={0} value={adj.menge} onChange={e=>setAdj(a=>({...a,menge:e.target.value}))}/></div>
          <div><label style={LBL}>Grund</label><input value={adj.grund} onChange={e=>setAdj(a=>({...a,grund:e.target.value}))} placeholder="z.B. Inventur..."/></div>
        </div>
        <button onClick={()=>{onAdjust(adj);setAdj({typ:'paletten',aktion:'add',menge:0,grund:'']);}} style={{background:C.acc,color:'#000',border:'none',borderRadius:7,padding:'8px 18px',fontWeight:700,fontSize:13,cursor:'pointer'}}>✓ Anpassen</button>
      </div>

}

function VerlaufView({buchungen,onDelete,onClear}){
  const [search,setSearch]=useState('');
  const [typF,setTypF]=useState('');
  const filtered=useMemo(()=>buchungen.filter(b=>{if(typF&&b.typ!==typF)return false;if(search){const s=search.toLowerCase();return(b.transporteur||'').toLowerCase().includes(s)||(b.kennzeichen||'').toLowerCase().includes(s)||(b.notiz||'').toLowerCase().includes(s);}return true;}),[buchungen,search,typF]);
  return(
    <div>
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Suche..." style={{width:200}}/>
        <select value={typF} onChange={e=>setTypF(e.target.value)} style={{width:180}}><option value="">Alle Typen</option>{Object.entries(TYP_LABEL).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select>
        <button onClick={()=>{if(window.confirm('Wirklich alle löschen?'))onClear();}} style={{background:'rgba(239,68,68,0.12)',color:'#f87171',border:'1px solid rgba(239,68,68,0.3)',borderRadius:7,padding:'7px 14px',fontWeight:700,fontSize:13,cursor:'pointer'}}>🗑 Alle löschen</button>
      </div>
      <div style={{background:C.surf,border:'1px solid '+C.brd,borderRadius:10,overflow:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',minWidth:900}}>
          <thead><tr>{['Datum/Zeit','Typ','Transporteur','Kennzeichen','P','R','D','Schw.P','Schw.R','Schw.D','Notiz',''].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
          <tbody>
            {filtered.map(b=>(
              <tr key={b.id}>
                <td style={{...TD,fontFamily:'monospace',fontSize:11,whiteSpace:'nowrap'}}>{fmtDt(b.datetime)}</td>
                <td style={TD}><Badge typ={b.typ}/></td>
                <td style={TD}>{b.transporteur}</td>
                <td style={{...TD,fontFamily:'monospace',fontSize:11,color:C.txt2}}>{b.kennzeichen}</td>
                <td style={{...TD,color:C.pal,fontFamily:'monospace'}}>{b.paletten}</td>
                <td style={{...TD,color:C.rah,fontFamily:'monospace'}}>{b.rahmen}</td>
                <td style={{...TD,color:C.dec,fontFamily:'monospace'}}>{b.deckel}</td>
                {[b.schwund_p,b.schwund_r,b.schwund_d].map((v,i)=><td key={i} style={{...TD,color:v>0?C.danger:C.txt3,fontFamily:'monospace'}}>{v||0}</td>)}
                <td style={{...TD,fontSize:11,color:C.txt2}}>{b.notiz||'—'}</td>
                <td style={TD}><button onClick={()=>onDelete(b.id)} style={{background:'rgba(239,68,68,0.12)',color:'#f87171',border:'1px solid rgba(239,68,68,0.3)',borderRadius:6,padding:'3px 9px',fontSize:12,cursor:'pointer'}}>🗑</button></td>
              </tr>
            ))}
            {filtered.length===0&&<tr><td colSpan={12} style={{...TD,textAlign:'center',color:C.txt3,padding:32}}>Keine Einträge</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function SpediteureView({spediteure,buchungen,onAdd,onDelete,onNotif}){
  const [f,setF]=useState({name:'',typ:'extern',kontakt:'',telefon:'',email:'',notiz:''});
  const [search,setSearch]=useState('');
  const [typF,setTypF]=useState('');
  function save(){
    if(!f.name.trim()){onNotif('⚠️ Firmenname ist Pflichtfeld!','warn');return;}
    if(spediteure.find(s=>s.name.toLowerCase()===f.name.trim().toLowerCase())){onNotif('⚠️ Spediteur existiert bereits!','warn');return;}
    onAdd({...f,name:f.name.trim()});
    setF({name:'',typ:'extern',kontakt:'',telefon:'',email:'',notiz:''});
  }
  const filtered=spediteure.filter(s=>{if(typF&&s.typ!==typF)return false;if(search){const q=search.toLowerCase();return s.name.toLowerCase().includes(q)||(s.kontakt||'').toLowerCase().includes(q);}return true;});
  return(
    <div>
      <div style={{background:C.surf,border:'1px solid '+C.brd,borderRadius:10,padding:'1.4rem',marginBottom:'1.4rem'}}>
        <div style={{fontWeight:700,fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',color:C.txt2,marginBottom:14}}>➕ Neuer Spediteur</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:12,marginBottom:14}}>
          <div><label style={LBL}>Firmenname *</label><input value={f.name} onChange={e=>setF(x=>({...x,name:e.target.value}))} placeholder="z.B. DB Schenker AG"/></div>
          <div><label style={LBL}>Typ</label><select value={f.typ} onChange={e=>setF(x=>({...x,typ:e.target.value}))}><option value="extern">🚛 Extern (Spedition)</option><option value="intern">🔄 Intern</option></select></div>
          <div><label style={LBL}>Kontaktperson</label><input value={f.kontakt} onChange={e=>setF(x=>({...x,kontakt:e.target.value}))} placeholder="Max Müller"/></div>
          <div><label style={LBL}>Telefon</label><input value={f.telefon} onChange={e=>setF(x=>({...x,telefon:e.target.value}))} placeholder="+41 44 123 45 67"/></div>
          <div><label style={LBL}>E-Mail</label><input value={f.email} onChange={e=>setF(x=>({...x,email:e.target.value}))} placeholder="info@firma.ch"/></div>
          <div><label style={LBL}>Notiz</label><input value={f.notiz} onChange={e=>setF(x=>({...x,notiz:e.target.value}))} placeholder="Stammkunde..."/></div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={save} style={{background:C.acc,color:'#000',border:'none',borderRadius:7,padding:'8px 18px',fontWeight:700,fontSize:13,cursor:'pointer'}}>✓ Spediteur speichern</button>
          <button onClick={()=>setF({name:'',typ:'extern',kontakt:'',telefon:'',email:'',notiz:''})} style={{background:C.surf2,color:C.txt,border:'1px solid '+C.brd,borderRadius:7,padding:'8px 18px',fontWeight:600,fontSize:13,cursor:'pointer'}}>✕ Reset</button>
        </div>
      </div>
      <div style={{fontWeight:700,fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',color:C.txt2,marginBottom:14}}>🚚 Gespeicherte Spediteure ({spediteure.length})</div>
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Suche..." style={{width:200}}/>
        <select value={typF} onChange={e=>setTypF(e.target.value)} style={{width:160}}><option value="">Alle Typen</option><option value="extern">Extern</option><option value="intern">Intern</option></select>
      </div>
      {filtered.length===0&&<div style={{textAlign:'center',padding:40,color:C.txt3,fontSize:13}}>🚚 Keine Spediteure vorhanden</div>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:12}}>
        {filtered.map(s=>{
          const count=buchungen.filter(b=>b.transporteur===s.name).length;
          const col=s.typ==='extern'?C.acc:C.acc2;
          return(
            <div key={s.id} style={{background:C.surf,border:'1px solid '+C.brd,borderTop:'4px solid '+col,borderRadius:12,padding:'1.2rem',display:'flex',flexDirection:'column',gap:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div><div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{s.name}</div><span style={{display:'inline-block',padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:700,background:s.typ==='extern'?'rgba(245,166,35,0.15)':'rgba(59,130,246,0.15)',color:col}}>{s.typ==='extern'?'🚛 Extern':'🔄 Intern'}</span></div>
                <span style={{background:C.surf2,border:'1px solid '+C.brd,borderRadius:10,padding:'2px 8px',fontSize:11,color:C.txt2,whiteSpace:'nowrap'}}>{count} Buchungen</span>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4,fontSize:12,color:C.txt2,paddingTop:8,borderTop:'1px solid '+C.brd}}>
                {s.kontakt&&<div>👤 {s.kontakt}</div>}
                {s.telefon&&<div>📞 {s.telefon}</div>}
                {s.email&&<div>✉️ {s.email}</div>}
                {s.notiz&&<div style={{color:C.txt3,fontStyle:'italic'}}>💬 {s.notiz}</div>}
              </div>
              <button onClick={()=>{if(window.confirm('Spediteur "'+s.name+'" wirklich löschen?'))onDelete(s.id);}} style={{width:'100%',padding:'9px',background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:7,color:'#f87171',fontWeight:700,fontSize:13,cursor:'pointer'}}>🗑 Spediteur löschen</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App(){
  const fb=useFirebase();
  const [tab,setTab]=useState('dashboard');
  const [buchungen,setBuchungen]=useState([]);
  const [bestand,setBestand]=useState({paletten:0,rahmen:0,deckel:0});
  const [spediteure,setSpediteure]=useState([]);
  const [notif,setNotif]=useState(null);
  const [showExport,setShowExport]=useState(false);
  const [syncStatus,setSyncStatus]=useState('loading');

  // Firebase real-time listeners
  useEffect(()=>{
    if(!fb)return;
    const {db,collection,onSnapshot,doc,getDoc}=fb;
    setSyncStatus('loading');

    // Listen to buchungen
    const unsubB=onSnapshot(collection(db,'buchungen'),(snap)=>{
      const data=snap.docs.map(d=>({...d.data(),id:d.id}));
      data.sort((a,b)=>new Date(b.datetime||0)-new Date(a.datetime||0));
      setBuchungen(data);
      setSyncStatus('online');
    },()=>setSyncStatus('offline'));

    // Listen to spediteure
    const unsubS=onSnapshot(collection(db,'spediteure'),(snap)=>{
      setSpediteure(snap.docs.map(d=>({...d.data(),id:d.id})));
    });

    // Listen to bestand
    const unsubBst=onSnapshot(doc(db,'config','bestand'),(snap)=>{
      if(snap.exists())setBestand(snap.data());
      else setBestand({paletten:0,rahmen:0,deckel:0});
    });

    return()=>{unsubB();unsubS();unsubBst();};
  },[fb]);

  function showNotif(msg,type){setNotif({msg,type:type||'ok'});setTimeout(()=>setNotif(null),3000);}

  async function handleBuchung(entry){
    if(!fb){showNotif('⚠️ Keine Firebase-Verbindung','warn');return;}
    const {db,collection,addDoc,doc,setDoc,getDoc}=fb;
    const p=entry.paletten,r=entry.rahmen,d=entry.deckel;
    // Update bestand
    const bRef=doc(db,'config','bestand');
    const bSnap=await getDoc(bRef);
    const cur=bSnap.exists()?bSnap.data():{paletten:0,rahmen:0,deckel:0};
    let newB={...cur};
    if(entry.typ.startsWith('retoure')||entry.typ==='manuell'){newB.paletten+=p;newB.rahmen+=r;newB.deckel+=d;}
    else{newB.paletten-=p;newB.rahmen-=r;newB.deckel-=d;}
    await setDoc(bRef,newB);
    // Add buchung
    await addDoc(collection(db,'buchungen'),{...entry,createdAt:new Date().toISOString()});
    showNotif('✓ Buchung gespeichert und synchronisiert!');
  }

  async function handleAdjust(adj){
    if(!fb)return;
    const {db,doc,setDoc,getDoc,collection,addDoc}=fb;
    const m=parseInt(adj.menge)||0;
    const bRef=doc(db,'config','bestand');
    const bSnap=await getDoc(bRef);
    const cur=bSnap.exists()?bSnap.data():{paletten:0,rahmen:0,deckel:0};
    const newB={...cur};
    if(adj.aktion==='add')newB[adj.typ]+=m;
    else if(adj.aktion==='sub')newB[adj.typ]=Math.max(0,newB[adj.typ]-m);
    else newB[adj.typ]=m;
    await setDoc(bRef,newB);
    await addDoc(collection(db,'buchungen'),{typ:'manuell',transporteur:'Manuell',kennzeichen:'—',datetime:localNow(),paletten:adj.typ==='paletten'?m:0,rahmen:adj.typ==='rahmen'?m:0,deckel:adj.typ==='deckel'?m:0,schwund_p:0,schwund_r:0,schwund_d:0,notiz:adj.grund||'Manuelle Anpassung',createdAt:new Date().toISOString()});
    showNotif('✓ Bestand angepasst und synchronisiert!');
  }

  async function handleAddSpediteur(sp){
    if(!fb)return;
    const {db,collection,addDoc}=fb;
    await addDoc(collection(db,'spediteure'),sp);
    showNotif('✓ "'+sp.name+'" gespeichert!');
  }

  async function handleDeleteSpediteur(id){
    if(!fb)return;
    const {db,doc,deleteDoc}=fb;
    await deleteDoc(doc(db,'spediteure',id));
    showNotif('🗑 Spediteur gelöscht');
  }

  async function handleDeleteBuchung(id){
    if(!fb)return;
    const {db,doc,deleteDoc}=fb;
    await deleteDoc(doc(db,'buchungen',id));
    showNotif('🗑 Buchung gelöscht');
  }

  async function handleClearBuchungen(){
    if(!fb)return;
    const {db,collection,onSnapshot,doc,deleteDoc}=fb;
    const snap=await new Promise(res=>{const u=onSnapshot(fb.collection(fb.db,'buchungen'),s=>{u();res(s);});});
    await Promise.all(snap.docs.map(d=>deleteDoc(doc(db,'buchungen',d.id))));
  }

  const TABS=[['dashboard','📊 Dashboard'],['buchung','📋 Buchung'],['bestand','📦 Bestand'],['verlauf','📜 Verlauf'],['spediteure','🚚 Spediteure']];

  if(!fb){
    return(
      <div style={{background:C.bg,color:C.txt,minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
        <div style={{fontSize:32}}>⬡</div>
        <div style={{fontSize:18,fontWeight:700,color:C.acc}}>PalettenTrack Pro</div>
        <div style={{fontSize:13,color:C.txt2}}>Verbinde mit Firebase...</div>
        <div style={{width:40,height:40,border:'3px solid '+C.brd,borderTop:'3px solid '+C.acc,borderRadius:'50%',animation:'spin 1s linear infinite'}}></div>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      </div>
    );
  }

  return(
    <div style={{background:C.bg,color:C.txt,minHeight:'100vh'}}>
      <div style={{background:C.surf,borderBottom:'1px solid '+C.brd,padding:'0 1.5rem',display:'flex',alignItems:'center',justifyContent:'space-between',height:58,position:'sticky',top:0,zIndex:100}}>
        <div style={{fontWeight:800,fontSize:20,display:'flex',alignItems:'center',gap:6}}>
          <span style={{color:C.acc,fontSize:22}}>⬡</span>
          Paletten<span style={{color:C.acc}}>Track</span> Pro
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <SyncBadge status={syncStatus}/>
          <div style={{background:C.surf2,border:'1px solid '+C.brd,borderRadius:6,padding:'4px 10px',fontFamily:'monospace',fontSize:11,color:C.txt2}}>{fmtDate()}</div>
          <button onClick={()=>setShowExport(true)} style={{background:'#f0c419',color:'#1a1a2e',border:'none',borderRadius:7,padding:'7px 14px',fontWeight:700,fontSize:13,cursor:'pointer'}}>⬇️ Power BI Export</button>
        </div>
      </div>
      <div style={{background:C.surf,borderBottom:'1px solid '+C.brd,display:'flex',overflowX:'auto'}}>
        {TABS.map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{background:'none',border:'none',borderBottom:'3px solid '+(tab===id?C.acc:'transparent'),padding:'12px 16px',color:tab===id?C.acc:C.txt2,fontWeight:600,fontSize:13,cursor:'pointer',whiteSpace:'nowrap'}}>{label}</button>
        ))}
      </div>
      <div style={{padding:'1.5rem',maxWidth:1400,margin:'0 auto'}}>
        {tab==='dashboard'&&<Dashboard buchungen={buchungen} bestand={bestand}/>}
        {tab==='buchung'&&<BuchungView spediteure={spediteure} onSave={handleBuchung} onNotif={showNotif}/>}
        {tab==='bestand'&&<BestandView bestand={bestand} onAdjust={handleAdjust}/>}
        {tab==='verlauf'&&<VerlaufView buchungen={buchungen} onDelete={handleDeleteBuchung} onClear={handleClearBuchungen}/>}
        {tab==='spediteure'&&<SpediteureView spediteure={spediteure} buchungen={buchungen} onAdd={handleAddSpediteur} onDelete={handleDeleteSpediteur} onNotif={showNotif}/>}
      </div>
      {showExport&&<ExportModal onClose={()=>setShowExport(false)} buchungen={buchungen} bestand={bestand} spediteure={spediteure}/>}
      {notif&&<div style={{position:'fixed',top:70,right:20,background:C.surf2,border:'1px solid '+C.brd,borderLeft:'4px solid '+(notif.type==='warn'?C.warn:C.acc3),borderRadius:8,padding:'10px 16px',fontSize:13,zIndex:999,maxWidth:300,boxShadow:'0 4px 20px rgba(0,0,0,0.4)'}}>{notif.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
